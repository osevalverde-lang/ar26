<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR26</title>

  <link rel="apple-touch-icon" sizes="180x180" href="https://i.imgur.com/At3TYPk.png">
  <link rel="icon" type="image/png" href="https://i.imgur.com/At3TYPk.png">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="AR26">
  <meta name="theme-color" content="#0c0f14">

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#0c0f14;
      color:#fff;
      display:flex;
      min-height:100vh;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:24px;
    }
    .card{
      max-width:360px;
      width:100%;
    }
    img{
      width:120px;
      height:120px;
      border-radius:26px;
      display:block;
      margin:0 auto 18px;
    }
    h1{
      margin:0 0 10px;
      font-size:28px;
    }
    p{
      margin:0 0 20px;
      color:#cbd5e1;
      line-height:1.4;
    }
    a.boton{
      display:inline-block;
      background:#0f766e;
      color:#fff;
      text-decoration:none;
      padding:14px 22px;
      border-radius:14px;
      font-weight:bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://i.imgur.com/At3TYPk.png" alt="AR26">
    <h1>AR26</h1>
    <p>Acomodadores Asamblea Regional 2026</p>
<a class="boton" href="https://script.google.com/macros/s/AKfycbx5c_7QfbsrqpXiKUJrIB4ApnpMgfoTD3PVnDVo683V5vbuKPSpGxw-Vj6-GDIB2wv8/exec">Abrir app</a>  
  </div>
</body>
</html>
